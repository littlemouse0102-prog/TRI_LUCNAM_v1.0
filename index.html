<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Triathlon Lục Nam</title>
    <!-- Thư viện Font và Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Liên kết chuẩn đến tệp CSS Ngọc Trai trong thư mục css/ -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container animate-fade-in">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fa-solid fa-person-biking"></i>
            </div>
            <h1>TRIATHLON LỤC NAM</h1>
        </div>

        <div class="login-card">
            <h2>Đăng Nhập Thành Viên</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <!-- Giữ ID pinInput để tương thích tuyệt đối với tệp JS hệ thống -->
                        <input type="password" id="pinInput" placeholder="Nhập mã PIN của bạn" maxlength="10" autocomplete="off" required>
                    </div>
                    <div id="errorMessage" class="error-message">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <span>Mã PIN không chính xác. Vui lòng thử lại!</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">
                    <span class="btn-text">Vào Hệ Thống</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>

           
        </div>
    </div>

    <!-- Gọi chuẩn đường dẫn tệp logic hệ thống -->
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
