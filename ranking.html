<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảng Xếp Hạng - TRIATHLON LỤC NAM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/ranking.css">

    <!-- CODE HIỂN THỊ ICON APP TRÊN IPHONE: -->
    <link rel="apple-touch-icon" href="avatars/TRILN.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tri-LN">
    <!-- Các thẻ meta, font, css cũ của anh -->
    <link rel="stylesheet" href="css/global.css">
    
    <!-- THẺ QUAN TRỌNG ĐỂ ĐỒNG BỘ MÀU -->
    <link id="dynamic-theme-css" rel="stylesheet" href="">
</head>
<body>

    <div class="app-container animate-fade-in">
        
        <!-- HEADER CỐ ĐỊNH -->
        <header class="app-header">
            <div class="header-left" onclick="window.location.href='member.html'">
                <i class="fa-solid fa-chevron-left"></i>
                <span class="brand-short">TRỞ VỀ</span>
            </div>
            <div class="header-center">BẢNG XẾP HẠNG</div>
            <div class="header-right">
                <i class="fa-solid fa-trophy-star trophy-icon"></i>
            </div>
        </header>

        <!-- NỘI DUNG CHÍNH -->
        <main class="app-content">

            <!-- THẺ TỔNG KẾT CLB -->
            <section class="summary-cards">
                <div class="mini-card">
                    <span class="icon">🏊</span>
                    <div class="info">
                        <span class="label">Tổng Bơi</span>
                        <h5 id="clubSwim">-- km</h5>
                    </div>
                </div>
                <div class="mini-card">
                    <span class="icon">🚴</span>
                    <div class="info">
                        <span class="label">Tổng Đạp</span>
                        <h5 id="clubBike">-- km</h5>
                    </div>
                </div>
                <div class="mini-card">
                    <span class="icon">🏃</span>
                    <div class="info">
                        <span class="label">Tổng Chạy</span>
                        <h5 id="clubRun">-- km</h5>
                    </div>
                </div>
                <div class="mini-card">
                    <span class="icon">🏆</span>
                    <div class="info">
                        <span class="label">Tổng Cups</span>
                        <h5 id="clubCups">--</h5>
                    </div>
                </div>
            </section>

            <!-- PODIUM (TOP 3) -->
            <section class="podium-section">
                <div class="podium-container" id="podiumContainer">
                    <div class="podium-card skeleton" style="height: 120px;"></div>
                    <div class="podium-card skeleton" style="height: 140px;"></div>
                    <div class="podium-card skeleton" style="height: 110px;"></div>
                </div>
            </section>

            <!-- BỘ LỌC TABS -->
            <section class="filter-section">
                <div class="tabs-scroll">
                    <button class="tab-btn active" data-type="all">Tổng</button>
                    <button class="tab-btn" data-type="swim">Bơi</button>
                    <button class="tab-btn" data-type="bike">Đạp</button>
                    <button class="tab-btn" data-type="run">Chạy</button>
                </div>
            </section>

            <!-- THANH TÌM KIẾM -->
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchBar" placeholder="Tìm tên hoặc mã thành viên...">
            </div>

            <!-- DANH SÁCH XẾP HẠNG -->
            <section class="leaderboard-section">
                <div class="section-title" id="leaderboardTitle">BXH TỔNG TRIATHLON</div>
                
                <div class="leaderboard-list" id="leaderboardRows">
                    <div class="list-item-skeleton"></div>
                    <div class="list-item-skeleton"></div>
                    <div class="list-item-skeleton"></div>
                </div>
            </section>

            <!-- NÚT ĐĂNG XUẤT -->
            <div id="logoutSection" style="margin: 30px 0 10px 0; text-align: center;">
                <button id="adminLogoutBtn" class="btn-logout" style="
                    background-color: #FFF5F5;
                    color: #C53030;
                    border: 1px solid #FEB2B2;
                    padding: 12px 24px;
                    border-radius: 12px;
                    font-weight: 600;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 10px;
                    width: 100%;
                    font-size: 14px;
                    transition: all 0.3s;">
                    <i class="fa-solid fa-power-off"></i> Đăng xuất
                </button>
            </div>

            <!-- ĐOẠN ĐỆM TRÁNH BỊ THANH MENU CHE NỘI DUNG -->
            <div class="bottom-spacer" style="height: 70px;"></div>

        </main>
    </div>

    <!-- MODAL CHI TIẾT THÀNH VIÊN (NẾU CÓ) -->
    <div id="userModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <!-- Nội dung modal -->
            </div>
        </div>
    </div>

    <!-- THANH ĐIỀU HƯỚNG ĐÁY MÀN HÌNH (BOTTOM NAVIGATION) -->
    <nav class="bottom-nav">
        <a href="member.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Cá nhân</span>
        </a>

        <!-- Thùng chứa kiểm tra quyền Admin bằng JS -->
        <div id="admin-link-container" style="display: contents;"></div>

        <a href="wall.html" class="nav-item">
            <i class="fa-solid fa-medal"></i>
            <span>Thành tích</span>
        </a>
        
        <a href="https://docs.google.com/spreadsheets/d/1AWZRIlJTNjbVUdLm4X-oItdpyBzfO6kq/edit?gid=996045951#gid=996045951" class="nav-item" target="_blank">
            <i class="fa-solid fa-chart-line"></i>
            <span>Báo cáo</span>
        </a>
        
        <a href="ranking.html" class="nav-item active">
            <i class="fa-solid fa-trophy"></i>
            <span>Xếp hạng</span>
        </a>  
    </nav>

    <!-- SCRIPTS -->
    <script src="js/api.js"></script>
    <script src="js/ranking.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        // Xử lý nút Đăng xuất
        const logoutBtn = document.getElementById("adminLogoutBtn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", () => {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = "index.html";
            });
        }

        // Kiểm tra quyền Admin để hiển thị icon trên thanh menu đáy
        const userJson = localStorage.getItem("triathlon_user");
        const user = userJson ? JSON.parse(userJson) : null;

        if (user && user.role === "ADMIN") {
            const container = document.getElementById('admin-link-container');
            if (container) {
                container.innerHTML = `
                    <a href="admin.html" class="nav-item">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>ADMIN</span>
                    </a>
                `;
            }
        }
    });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Tự động nạp theme đã lưu cho mọi file HTML ngay khi mở lên
            const savedTheme = localStorage.getItem('app_theme');
            if (savedTheme) {
                loadThemeCss(savedTheme);
            }

            // Xử lý bật/tắt menu chấm màu sổ xuống (nếu trang đó có nút đổi màu)
            const themeBtn = document.getElementById('themeSwitcherBtn');
            const themeDropdown = document.getElementById('themeDropdown');

            if (themeBtn && themeDropdown) {
                themeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    themeDropdown.classList.toggle('show');
                });

                document.addEventListener('click', () => {
                    themeDropdown.classList.remove('show');
                });
                
                themeDropdown.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }
        });

        // Hàm thay đổi, lưu trữ và đồng bộ hóa cho toàn bộ các trang HTML khác
        function setTheme(themeName) {
            localStorage.setItem('app_theme', themeName);
            loadThemeCss(themeName);
            
            const dropdown = document.getElementById('themeDropdown');
            if (dropdown) dropdown.classList.remove('show');
        }

        // Hàm thực thi chèn link CSS tương ứng vào thẻ <head>
        function loadThemeCss(themeName) {
            let themeLink = document.getElementById('dynamic-theme-css');
            
            if (!themeLink) {
                themeLink = document.createElement('link');
                themeLink.id = 'dynamic-theme-css';
                themeLink.rel = 'stylesheet';
                document.head.appendChild(themeLink);
            }

            if (themeName === 'default') {
                themeLink.href = '';
            } else {
                themeLink.href = `css/${themeName}.css`;
            }
        }
    </script>
</body>
</html>
